@version: 3.38
@include "scl.conf"

####################################
# SOURCE
####################################
source s_udp_514 {
  network(
    ip("0.0.0.0")
    port(514)
    transport("udp")
  );
};

####################################
# FILTER: only 10.84.0.0/16 senders
####################################
filter f_from_10_84 {
  netmask("10.84.0.0/16");
};

####################################
# DESTINATION
####################################
destination d_local_file {
  file(
    "/var/log/syslog-ng-10.84.log"
    create-dirs(yes)
    perm(0644)
    template("${ISODATE} SRC=${SOURCEIP} HOST=${HOST} MSG=${MESSAGE}\n")
  );
};

####################################
# LOG PATH
####################################
log {
  source(s_udp_514);
  filter(f_from_10_84);
  destination(d_local_file);
};
