frontend wazuh_logs_REPLACE_CUSTOMER
    mode tcp
    bind :REPLACE_LOGS_PORT
    default_backend tcp_default_wazuh_logs_REPLACE_CUSTOMER
    log-format "%ci:%cp [%t] %ft %b/%s (%si:%sp) %Tw/%Tc/%Tt %B %ts %ac/%fc/%bc/%sc/%rc %sq/%bq"
frontend wazuh_registration_REPLACE_CUSTOMER
    mode tcp
    bind :REPLACE_REGISTRATION_PORT
    default_backend tcp_default_wazuh_registration_REPLACE_CUSTOMER
    log-format "%ci:%cp [%t] %ft %b/%s (%si:%sp) %Tw/%Tc/%Tt %B %ts %ac/%fc/%bc/%sc/%rc %sq/%bq"
backend tcp_default_wazuh_logs_REPLACE_CUSTOMER
    mode tcp
    server wazuh-worker REPLACE_WORKER:REPLACE_LOGS_PORT

backend tcp_default_wazuh_registration_REPLACE_CUSTOMER
    mode tcp
    server wazuh-worker REPLACE_WORKER:REPLACE_REGISTRATION_PORT
